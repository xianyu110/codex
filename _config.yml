# GitHub Pages 配置文件 - Codex 中文实战教程
title: "Codex 中文实战教程"
description: "Codex 国内站入口、安装配置指南、实战案例库与安全速查"
url: "https://xianyu110.github.io"
baseurl: "/codex"

# SEO 优化
lang: zh-CN
author: "Codex 中文教程"
keywords: "Codex, Codex 教程, ChatGPT, GPTimage2, AI 编程, MCP, Skills, 自动化, 国内站"

# 插件配置 (如果使用Jekyll)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# 构建设置
markdown: kramdown
highlighter: rouge

# 集合设置
collections:
  pages:
    output: true
    permalink: /:name/

# 排除文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - "*.gemspec"
  - .gitignore
  - .git/
  - .DS_Store
  - "**/.*"
  - "*.tmp"
  - "*.bak"

# 包含文件
include:
  - _pages

# 默认设置
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      author: "Codex 中文教程"
