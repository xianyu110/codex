<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex 速查与安全</title>
  <meta name="description" content="Codex 命令、推荐设置、安全规则和常见问题速查。">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    :root {
      --bg: #f7fafc;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe4ee;
      --brand: #0f766e;
      --brand-dark: #115e59;
      --soft: #ecfdf5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 0%, rgba(15, 118, 110, 0.08), transparent 28%),
        linear-gradient(180deg, #f8fafc 0%, #eef7f6 100%);
      line-height: 1.7;
    }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }
    .brand { color: var(--brand); font-weight: 900; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    .nav a,
    .button {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .nav a:hover,
    .button:hover,
    .card:hover {
      border-color: rgba(15, 118, 110, 0.38);
      color: var(--brand-dark);
      transform: translateY(-2px);
    }
    .button-primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    .hero { padding: 54px 0 32px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      padding: 22px;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    h1 { font-size: clamp(34px, 5vw, 62px); line-height: 1.08; margin: 0 0 16px; letter-spacing: 0; }
    h2 { font-size: clamp(24px, 3.6vw, 38px); margin: 0 0 16px; letter-spacing: 0; }
    h3 { margin: 0 0 10px; color: var(--brand); }
    p { margin: 0; color: var(--muted); }
    .lead { color: var(--muted); font-size: 18px; max-width: 760px; }
    .section { padding: 30px 0; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    @media (max-width: 760px) {
      .grid-2 { grid-template-columns: 1fr; }
      .topbar-inner { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="../index.html">CODEX 速查</a>
      <nav class="nav">
        <a href="../index.html">首页</a>
        <a href="../docs/">教程目录</a>
        <a href="../recipes/">实战案例</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container card">
        <h1>速查与安全</h1>
        <p class="lead">把最常用命令、推荐设置、安全边界和常见问题放在一页，方便新手边用边查。</p>
        <div class="actions">
          <a class="button button-primary" href="../reader.html?file=reference/commands.md">命令速查</a>
          <a class="button" href="../reader.html?file=reference/safety.md">安全规则</a>
          <a class="button" href="../reader.html?file=reference/faq.md">FAQ</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container grid-2">
        <a class="card" href="../reader.html?file=reference/commands.md"><h3>命令 / 斜杠速查</h3><p>/plan、/status、git、rg、本地预览。</p></a>
        <a class="card" href="../reader.html?file=reference/settings.md"><h3>推荐设置</h3><p>推理深度、权限、AGENTS.md 默认规则。</p></a>
        <a class="card" href="../reader.html?file=reference/safety.md"><h3>避坑与安全</h3><p>密钥、权限、第三方中转和高风险操作。</p></a>
        <a class="card" href="../reader.html?file=reference/faq.md"><h3>FAQ</h3><p>新手最常问的问题。</p></a>
      </div>
    </section>
  </main>
</body>
</html>
